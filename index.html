<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個人記事本 · Notes</title>
  
  <link rel="stylesheet" href="style.css">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

<h2 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">個人記事本</h2>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-section">我的記事 · Notes</div>
    <div id="sidebarList"></div>
    <div class="sidebar-footer">
      <button class="new-btn" id="newBtn">
        <i class="ti ti-plus" aria-hidden="true"></i>
        新增記事 · New note
      </button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <i class="ti ti-file-text" aria-hidden="true" style="font-size:15px;color:var(--text-muted);"></i>
        <span class="topbar-title" id="topbarTitle">選擇或新增記事</span>
      </div>
      <div class="search-wrap">
        <i class="ti ti-search" aria-hidden="true" style="font-size:14px;color:var(--text-muted);flex-shrink:0;"></i>
        <input type="text" id="searchInput" placeholder="搜尋 · Search…">
        <button class="search-clear" id="clearSearch" style="display:none" aria-label="清除搜尋"><i class="ti ti-x" style="font-size:13px;"></i></button>
      </div>
    </div>

    <div class="editor-area empty-state" id="editorArea">
      <div class="empty-hint">選取記事<br>或點擊「新增記事」開始<br><span style="font-size:12px;color:#9B9B97;">Select a note or create a new one</span></div>
    </div>

    <div id="editorFooterWrap" style="display:none;" class="editor-footer-wrap">
      <div id="confirmBar" style="display:none;" class="confirm-bar">
        <span>確定要刪除這則記事嗎？· Delete this note?</span>
        <div class="ca">
          <button class="fbtn fbtn-danger" id="confirmDelBtn">確定刪除</button>
          <button class="fbtn" id="cancelDelBtn">取消</button>
        </div>
      </div>
      <div class="editor-footer">
        <span class="footer-meta" id="footerMeta"></span>
        <div class="footer-actions">
          <button class="fbtn fbtn-danger" id="deleteBtn"><i class="ti ti-trash" aria-hidden="true" style="font-size:13px;vertical-align:-1px;margin-right:3px;"></i>刪除</button>
          <button class="fbtn" id="cancelBtn" style="display:none;">取消編輯</button>
          <button class="fbtn fbtn-primary" id="saveBtn"><i class="ti ti-check" aria-hidden="true" style="font-size:13px;vertical-align:-1px;margin-right:3px;"></i>儲存</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
