
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#FFFFFF;
  --sidebar:#F7F7F5;
  --text:#37352F;
  --text-muted:#6B6B66;
  --border:#E9E9E6;
  --hover:#DFE7EF;
  --note-default:#FFFFFF;
}
body{font-family:var(--font-sans);color:var(--text);background:var(--bg);}
.app{display:grid;grid-template-columns:256px minmax(0,1fr);min-height:560px;}
@media(max-width:600px){.app{grid-template-columns:1fr;}}

.sidebar{background:var(--sidebar);border-right:1px solid var(--border);padding:16px 10px;display:flex;flex-direction:column;gap:2px;}
.sidebar-section{font-size:11px;font-weight:500;color:var(--text-muted);letter-spacing:0.07em;padding:4px 8px;margin-bottom:2px;}
.sidebar-note{display:flex;align-items:flex-start;gap:8px;padding:7px 8px;border-radius:6px;cursor:pointer;transition:background 0.1s;position:relative;}
.sidebar-note:hover{background:var(--hover);}
.sidebar-note.active{background:var(--hover);}
.note-color-dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,0.12);flex-shrink:0;margin-top:3px;}
.sidebar-note-info{min-width:0;flex:1;}
.sidebar-note-title{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sidebar-note-preview{font-size:11px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.sidebar-empty{font-size:12px;color:var(--text-muted);padding:8px 8px;}
.sidebar-footer{margin-top:auto;padding-top:12px;border-top:1px solid var(--border);}
.new-btn{display:flex;align-items:center;gap:7px;width:100%;padding:7px 8px;border-radius:6px;border:none;background:transparent;color:var(--text);font-family:var(--font-sans);font-size:13px;cursor:pointer;transition:background 0.1s;}
.new-btn:hover{background:var(--hover);}
.new-btn i{font-size:15px;color:var(--text-muted);}

.main{background:var(--bg);display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border);gap:12px;}
.topbar-left{display:flex;align-items:center;gap:8px;min-width:0;}
.topbar-title{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.search-wrap{display:flex;align-items:center;gap:7px;background:var(--sidebar);border:1px solid var(--border);border-radius:6px;padding:5px 10px;flex:1;max-width:200px;}
.search-wrap input{border:none;background:transparent;color:var(--text);font-family:var(--font-sans);font-size:12px;outline:none;width:100%;}
.search-wrap input::placeholder{color:var(--text-muted);}
.search-clear{border:none;background:none;cursor:pointer;color:var(--text-muted);padding:0;line-height:1;}
.search-clear:hover{color:var(--text);}

.editor-area{flex:1;padding:32px 36px 20px;transition:background 0.2s;}
.editor-area.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;text-align:center;}
.empty-hint{font-size:14px;color:var(--text-muted);line-height:2.2;}

.color-toolbar{display:flex;align-items:center;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.color-toolbar-label{font-size:11px;color:var(--text-muted);margin-right:2px;}
.color-swatch{width:20px;height:20px;border-radius:50%;border:1.5px solid transparent;cursor:pointer;transition:transform 0.1s,border-color 0.1s;flex-shrink:0;}
.color-swatch:hover{transform:scale(1.15);}
.color-swatch.selected{border-color:#37352F;}

.field-title input{width:100%;border:none;outline:none;font-size:24px;font-weight:500;color:var(--text);font-family:var(--font-sans);padding:0;margin-bottom:14px;background:transparent;}
.field-title input::placeholder{color:#C9C9C5;}
.divider{height:1px;background:var(--border);margin-bottom:14px;}
.field-content textarea{width:100%;border:none;outline:none;font-size:14px;color:var(--text);font-family:var(--font-sans);line-height:1.8;min-height:160px;resize:none;background:transparent;padding:0;}
.field-content textarea::placeholder{color:#C9C9C5;}
.char-hint{font-size:11px;color:var(--text-muted);text-align:right;margin-top:6px;}

.editor-footer-wrap{border-top:1px solid var(--border);}
.confirm-bar{background:#FEF6F6;border-bottom:1px solid #F5C6C2;padding:10px 24px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.confirm-bar span{font-size:12px;color:#B03020;}
.confirm-bar .ca{display:flex;gap:6px;}
.editor-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;flex-wrap:wrap;gap:8px;}
.footer-meta{font-size:11px;color:var(--text-muted);}
.footer-actions{display:flex;gap:8px;}
.fbtn{font-family:var(--font-sans);font-size:12px;padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;transition:background 0.1s;}
.fbtn:hover{background:var(--hover);}
.fbtn:active{transform:scale(0.98);}
.fbtn-primary{background:#37352F;color:#fff;border-color:#37352F;}
.fbtn-primary:hover{background:#2B2926;border-color:#2B2926;color:#fff;}
.fbtn-danger{color:#B03020;border-color:var(--border);}
.fbtn-danger:hover{background:#FDECEA;border-color:#F5C6C2;}

mark{background:#DFE7EF;color:#37352F;border-radius:2px;padding:0 1px;}
</style>

<h2 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">個人記事本</h2>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-section">我的記事 · Notes</div>
    <div id="sidebarList"></div>
    <div class="sidebar-footer">
      <button class="new-btn" id="newBtn">
        <i class="ti ti-plus" aria-hidden="true"></i>
        新增記事 · New note
      </button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <i class="ti ti-file-text" aria-hidden="true" style="font-size:15px;color:var(--text-muted);"></i>
        <span class="topbar-title" id="topbarTitle">選擇或新增記事</span>
      </div>
      <div class="search-wrap">
        <i class="ti ti-search" aria-hidden="true" style="font-size:14px;color:var(--text-muted);flex-shrink:0;"></i>
        <input type="text" id="searchInput" placeholder="搜尋 · Search…">
        <button class="search-clear" id="clearSearch" style="display:none" aria-label="清除搜尋"><i class="ti ti-x" style="font-size:13px;"></i></button>
      </div>
    </div>

    <div class="editor-area empty-state" id="editorArea">
      <div class="empty-hint">從左側選取記事<br>或點擊「新增記事」開始<br><span style="font-size:12px;color:#9B9B97;">Select a note or create a new one</span></div>
    </div>

    <div id="editorFooterWrap" style="display:none;" class="editor-footer-wrap">
      <div id="confirmBar" style="display:none;" class="confirm-bar">
        <span>確定要刪除這則記事嗎？· Delete this note?</span>
        <div class="ca">
          <button class="fbtn fbtn-danger" id="confirmDelBtn">確定刪除</button>
          <button class="fbtn" id="cancelDelBtn">取消</button>
        </div>
      </div>
      <div class="editor-footer">
        <span class="footer-meta" id="footerMeta"></span>
        <div class="footer-actions">
          <button class="fbtn fbtn-danger" id="deleteBtn"><i class="ti ti-trash" aria-hidden="true" style="font-size:13px;vertical-align:-1px;margin-right:3px;"></i>刪除</button>
          <button class="fbtn" id="cancelBtn" style="display:none;">取消編輯</button>
          <button class="fbtn fbtn-primary" id="saveBtn"><i class="ti ti-check" aria-hidden="true" style="font-size:13px;vertical-align:-1px;margin-right:3px;"></i>儲存</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const COLORS=[
  {id:'white', bg:'#FFFFFF', label:'白色 · White'},
  {id:'yellow',bg:'#FFF9C4', label:'淡黃 · Yellow'},
  {id:'blue',  bg:'#E1F5FE', label:'淡藍 · Blue'},
  {id:'green', bg:'#E8F5E9', label:'淡綠 · Green'},
  {id:'pink',  bg:'#FCE4EC', label:'淡粉 · Pink'},
  {id:'peach', bg:'#FBE9E7', label:'淡橘 · Peach'},
];

const sidebarList=document.getElementById('sidebarList');
const editorArea=document.getElementById('editorArea');
const editorFooterWrap=document.getElementById('editorFooterWrap');
const topbarTitle=document.getElementById('topbarTitle');
const searchInput=document.getElementById('searchInput');
const clearSearch=document.getElementById('clearSearch');
const footerMeta=document.getElementById('footerMeta');
const saveBtn=document.getElementById('saveBtn');
const deleteBtn=document.getElementById('deleteBtn');
const cancelBtn=document.getElementById('cancelBtn');
const newBtn=document.getElementById('newBtn');
const confirmBar=document.getElementById('confirmBar');
const confirmDelBtn=document.getElementById('confirmDelBtn');
const cancelDelBtn=document.getElementById('cancelDelBtn');

let notes=[];
let activeId=null;
let isNew=false;
let searchTerm='';
let activeColor='white';

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function highlight(s,q){
  if(!q)return esc(s);
  const e=esc(s);
  return e.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<mark>${m}</mark>`);
}
function fmt(iso){
  const d=new Date(iso);
  return d.toLocaleDateString('zh-TW')+' '+d.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
}

async function load(){
  try{const r=await window.storage.get('notes_postit');notes=r?JSON.parse(r.value):[];}catch{notes=[];}
  renderSidebar();
}
async function persist(){
  try{await window.storage.set('notes_postit',JSON.stringify(notes));}catch{}
}

function colorById(id){return COLORS.find(c=>c.id===id)||COLORS[0];}

function renderSidebar(){
  const q=searchTerm.toLowerCase();
  const list=q?notes.filter(n=>n.title.toLowerCase().includes(q)||n.content.toLowerCase().includes(q)):notes;
  if(!list.length){
    sidebarList.innerHTML=`<div class="sidebar-empty">${q?'找不到結果 · No results':'尚無記事 · No notes'}</div>`;
    return;
  }
  sidebarList.innerHTML='';
  [...list].reverse().forEach(note=>{
    const col=colorById(note.color||'white');
    const el=document.createElement('div');
    el.className='sidebar-note'+(note.id===activeId?' active':'');
    const titleHtml=highlight(note.title||'（無標題）',searchTerm);
    const previewHtml=highlight((note.content||'').slice(0,36),searchTerm);
    el.innerHTML=`
      <span class="note-color-dot" style="background:${col.bg};" title="${col.label}"></span>
      <div class="sidebar-note-info">
        <div class="sidebar-note-title">${titleHtml}</div>
        <div class="sidebar-note-preview">${previewHtml||'<span style="color:#C9C9C5">無內容</span>'}</div>
      </div>`;
    el.addEventListener('click',()=>openNote(note.id));
    sidebarList.appendChild(el);
  });
}

function buildColorToolbar(selectedId){
  const wrap=document.createElement('div');
  wrap.className='color-toolbar';
  const lbl=document.createElement('span');
  lbl.className='color-toolbar-label';
  lbl.textContent='背景色 · Color';
  wrap.appendChild(lbl);
  COLORS.forEach(c=>{
    const sw=document.createElement('button');
    sw.className='color-swatch'+(c.id===selectedId?' selected':'');
    sw.style.background=c.bg;
    sw.title=c.label;
    sw.setAttribute('aria-label',c.label);
    sw.addEventListener('click',()=>{
      activeColor=c.id;
      editorArea.style.background=c.bg;
      wrap.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
      sw.classList.add('selected');
    });
    wrap.appendChild(sw);
  });
  return wrap;
}

function buildEditor(note){
  activeColor=note?note.color||'white':'white';
  const col=colorById(activeColor);
  editorArea.className='editor-area';
  editorArea.style.background=col.bg;
  editorArea.innerHTML='';

  editorArea.appendChild(buildColorToolbar(activeColor));

  const titleWrap=document.createElement('div');titleWrap.className='field-title';
  const titleInput=document.createElement('input');
  titleInput.type='text';titleInput.id='noteTitleInput';
  titleInput.placeholder='標題 · Title…';titleInput.maxLength=80;
  titleInput.value=note?esc(note.title):'';
  titleInput.addEventListener('input',e=>{topbarTitle.textContent=e.target.value||'（無標題）';});
  titleWrap.appendChild(titleInput);
  editorArea.appendChild(titleWrap);

  const div=document.createElement('div');div.className='divider';editorArea.appendChild(div);

  const contentWrap=document.createElement('div');contentWrap.className='field-content';
  const ta=document.createElement('textarea');
  ta.id='noteContentInput';ta.placeholder='開始輸入… · Start writing…';ta.maxLength=2000;
  ta.value=note?note.content:'';
  const ch=document.createElement('div');ch.className='char-hint';
  const cs=document.createElement('span');cs.id='charCount';cs.textContent=note?note.content.length:0;
  ch.appendChild(cs);const slash=document.createTextNode(' / 2000');ch.appendChild(slash);
  ta.addEventListener('input',()=>{cs.textContent=ta.value.length;});
  contentWrap.appendChild(ta);
  editorArea.appendChild(contentWrap);
  editorArea.appendChild(ch);

  editorFooterWrap.style.display='block';
  footerMeta.textContent=note?'最後編輯 · Edited：'+fmt(note.date):'尚未儲存 · Unsaved';
  cancelBtn.style.display=isNew?'inline-block':'none';
  confirmBar.style.display='none';
  topbarTitle.textContent=note?(note.title||'（無標題）'):'新增記事 · New note';
}

function openNote(id){
  activeId=id;isNew=false;
  const note=notes.find(n=>n.id===id);
  if(!note)return;
  buildEditor(note);
  renderSidebar();
}

function startNew(){
  activeId=uid();isNew=true;
  buildEditor(null);
  renderSidebar();
  document.getElementById('noteTitleInput').focus();
}

saveBtn.addEventListener('click',()=>{
  const ti=document.getElementById('noteTitleInput');
  const ci=document.getElementById('noteContentInput');
  if(!ti||!ci)return;
  const t=ti.value.trim(),c=ci.value.trim();
  if(!t&&!c){footerMeta.textContent='標題或內容不能都空白 · Required';return;}
  if(isNew){
    notes.push({id:activeId,title:t||'（無標題）',content:c,color:activeColor,date:new Date().toISOString()});
    isNew=false;cancelBtn.style.display='none';
  } else {
    const note=notes.find(n=>n.id===activeId);
    if(note){note.title=t||'（無標題）';note.content=c;note.color=activeColor;note.date=new Date().toISOString();}
  }
  persist();
  topbarTitle.textContent=t||'（無標題）';
  footerMeta.textContent='已儲存 · Saved · '+fmt(new Date().toISOString());
  renderSidebar();
});

deleteBtn.addEventListener('click',()=>{confirmBar.style.display='flex';});
confirmDelBtn.addEventListener('click',()=>{
  notes=notes.filter(n=>n.id!==activeId);
  persist();
  activeId=null;isNew=false;
  editorArea.className='editor-area empty-state';
  editorArea.style.background='';
  editorArea.innerHTML='<div class="empty-hint">從左側選取記事<br>或點擊「新增記事」開始<br><span style="font-size:12px;color:#9B9B97;">Select a note or create a new one</span></div>';
  editorFooterWrap.style.display='none';
  topbarTitle.textContent='選擇或新增記事';
  renderSidebar();
});
cancelDelBtn.addEventListener('click',()=>{confirmBar.style.display='none';});

cancelBtn.addEventListener('click',()=>{
  activeId=null;isNew=false;
  editorArea.className='editor-area empty-state';
  editorArea.style.background='';
  editorArea.innerHTML='<div class="empty-hint">從左側選取記事<br>或點擊「新增記事」開始<br><span style="font-size:12px;color:#9B9B97;">Select a note or create a new one</span></div>';
  editorFooterWrap.style.display='none';
  topbarTitle.textContent='選擇或新增記事';
  renderSidebar();
});

newBtn.addEventListener('click',startNew);

searchInput.addEventListener('input',()=>{
  searchTerm=searchInput.value.trim();
  clearSearch.style.display=searchTerm?'inline':'none';
  renderSidebar();
});
searchInput.addEventListener('keyup',e=>{
  if(e.key==='Escape'){searchInput.value='';searchTerm='';clearSearch.style.display='none';renderSidebar();}
});
clearSearch.addEventListener('click',()=>{searchInput.value='';searchTerm='';clearSearch.style.display='none';renderSidebar();});

load();
</script>
